name: CI - API Bancaire

on:
  push:
    paths:
      - '03_exercices/exercice13/**'
      - '.github/workflows/exercice13-ci.yml'
  pull_request:
    paths:
      - '03_exercices/exercice13/**'
      - '.github/workflows/exercice13-ci.yml'

defaults:
  run:
    working-directory: 03_exercices/exercice13

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du projet
        uses: actions/checkout@v4

      - name: Installation de Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Execution des tests et generation des rapports
        run: mvn clean verify

      - name: Archivage des rapports Surefire
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: 03_exercices/exercice13/target/surefire-reports

      - name: Archivage du rapport JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: 03_exercices/exercice13/target/site/jacoco

      - name: Archivage des rapports Cucumber
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: 03_exercices/exercice13/target/cucumber-reports
